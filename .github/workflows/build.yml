name: Release Build and Publish

on:
  release:
    types: [published]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Prepare Binary (Linux/macOS)
      if: runner.os != 'Windows'
      run: mv ${{github.workspace}}/build/bdu ${{github.workspace}}/bdu-${{ runner.os }}-${{ runner.arch }}

    - name: Prepare Binary (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: move "${{github.workspace}}\\build\\Release\\bdu.exe" "${{github.workspace}}\\bdu-${{ runner.os }}-${{ runner.arch }}.exe"

    - name: Upload Release Artifacts
      uses: softprops/action-gh-release@v2
      with:
        files: bdu-*
